<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <!-- main chrome body: high-contrast sweep with a dark horizon band -->
    <linearGradient id="bodyChrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#fdfefe"/>
      <stop offset="0.14" stop-color="#eceef0"/>
      <stop offset="0.34" stop-color="#b4bac0"/>
      <stop offset="0.50" stop-color="#878e95"/>
      <stop offset="0.60" stop-color="#6b727a"/>
      <stop offset="0.72" stop-color="#aab0b6"/>
      <stop offset="0.88" stop-color="#dfe2e5"/>
      <stop offset="1"    stop-color="#f4f5f6"/>
    </linearGradient>

    <!-- concave saddle: the dip in the middle reads darker, ends stay bright -->
    <linearGradient id="saddleShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#000" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.36" stop-color="#000" stop-opacity="0.2"/>
      <stop offset="0.5"  stop-color="#000" stop-opacity="0.38"/>
      <stop offset="0.64" stop-color="#000" stop-opacity="0.2"/>
      <stop offset="0.82" stop-color="#000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <!-- one grip ridge: deep groove, hard machined highlight -->
    <linearGradient id="ridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#15181b"/>
      <stop offset="0.30" stop-color="#4a5157"/>
      <stop offset="0.52" stop-color="#aab1b7"/>
      <stop offset="0.60" stop-color="#ffffff"/>
      <stop offset="0.70" stop-color="#f2f4f6"/>
      <stop offset="0.90" stop-color="#aeb4ba"/>
      <stop offset="1"    stop-color="#c6cbd0"/>
    </linearGradient>
    <pattern id="ridges" x="0" y="0" width="15" height="260" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="15" height="260" fill="url(#ridge)"/>
    </pattern>
    <!-- crisp machined highlight lines that survive the dark saddle dip -->
    <pattern id="ridgeLines" x="0" y="0" width="15" height="260" patternUnits="userSpaceOnUse">
      <rect x="8.4" y="0" width="1.8" height="260" fill="#ffffff"/>
    </pattern>

    <!-- brushed-metal micro texture, streaked along the length -->
    <filter id="brushed" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.45" numOctaves="3" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.85  0 0 0 0 0.86  0 0 0 0 0.88  0 0 0 0.5 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>

    <!-- key light pooling on the left end cap (light from upper-left) -->
    <radialGradient id="endGlowL" cx="0.30" cy="0.26" r="0.95">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="endGlowR" cx="0.70" cy="0.30" r="0.95">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- rounded shoulders falling away at the far ends -->
    <linearGradient id="endFallL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0"   stop-color="#000" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#6e757b" stop-opacity="0.3"/>
      <stop offset="1"   stop-color="#3a4046" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="endFallR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#000" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#666d74" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#33393f" stop-opacity="0.7"/>
    </linearGradient>

    <!-- rolled-over flank edges, widest where the saddle dips -->
    <linearGradient id="flankTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3f454b" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#878e95" stop-opacity="0.4"/>
      <stop offset="1"   stop-color="#c8cdd2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flankBottom" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0"   stop-color="#4a5157" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#9aa1a8" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#d4d8dc" stop-opacity="0"/>
    </linearGradient>

    <!-- dark environment reflection band across the lower half -->
    <linearGradient id="horizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#23282d" stop-opacity="0"/>
      <stop offset="0.52" stop-color="#23282d" stop-opacity="0"/>
      <stop offset="0.60" stop-color="#23282d" stop-opacity="0.32"/>
      <stop offset="0.70" stop-color="#2c3137" stop-opacity="0.22"/>
      <stop offset="0.80" stop-color="#23282d" stop-opacity="0"/>
      <stop offset="1"    stop-color="#23282d" stop-opacity="0"/>
    </linearGradient>

    <!-- diagonal studio sheen sweeping across the cap -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.33" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.66" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.76" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- soft contact shadow under the cap -->
    <radialGradient id="dropShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#000" stop-opacity="0.32"/>
      <stop offset="0.7"  stop-color="#000" stop-opacity="0.13"/>
      <stop offset="1"    stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- center slot between the two halves -->
    <linearGradient id="slot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#3a3f44"/>
      <stop offset="0.25" stop-color="#08090b"/>
      <stop offset="0.75" stop-color="#08090b"/>
      <stop offset="1"    stop-color="#50565c"/>
    </linearGradient>

    <filter id="soft1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <filter id="soft3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- cap footprint: flared ends, gently pinched waist -->
    <path id="capOutline" d="
      M 24 100
      C 24 68, 38 48, 68 48
      C 116 48, 154 54, 200 54
      C 246 54, 284 48, 332 48
      C 362 48, 376 68, 376 100
      L 376 160
      C 376 192, 362 212, 332 212
      C 284 212, 246 206, 200 206
      C 154 206, 116 212, 68 212
      C 38 212, 24 192, 24 160
      Z"/>

    <clipPath id="capClip"><use href="#capOutline"/></clipPath>
    <clipPath id="gripClip">
      <rect x="100" y="40" width="200" height="180"/>
    </clipPath>
    <clipPath id="endZonesClip">
      <rect x="24"  y="40" width="84" height="180"/>
      <rect x="292" y="40" width="84" height="180"/>
    </clipPath>
  </defs>

  <!-- shadow on the deck: wide ambient + tighter core, slightly offset down -->
  <ellipse cx="202" cy="140" rx="196" ry="100" fill="url(#dropShadow)"/>
  <ellipse cx="202" cy="146" rx="178" ry="84" fill="url(#dropShadow)" opacity="0.7"/>

  <!-- cap body -->
  <use href="#capOutline" fill="url(#bodyChrome)"/>

  <g clip-path="url(#capClip)">
    <!-- ribbed grip section in the middle -->
    <g clip-path="url(#gripClip)">
      <rect x="100" y="40" width="200" height="180" fill="url(#ridges)"/>
      <rect x="100" y="40" width="200" height="180" fill="url(#saddleShade)" transform="rotate(90 200 130)" opacity="0.6"/>
    </g>

    <!-- smooth end caps blend into the first ridge -->
    <rect x="86"  y="40" width="22" height="180" fill="#aeb4ba" opacity="0.7"/>
    <rect x="292" y="40" width="22" height="180" fill="#aeb4ba" opacity="0.7"/>

    <!-- concave saddle shading along the length -->
    <rect x="24" y="40" width="352" height="180" fill="url(#saddleShade)"/>
    <rect x="24" y="40" width="352" height="180" fill="url(#saddleShade)" opacity="0.5"/>

    <!-- machined highlight lines stay bright through the dark dip -->
    <g clip-path="url(#gripClip)">
      <rect x="100" y="40" width="200" height="180" fill="url(#ridgeLines)" opacity="0.55"/>
    </g>

    <!-- dark environment reflection across the lower half of the end caps -->
    <g clip-path="url(#endZonesClip)">
      <use href="#capOutline" fill="url(#horizon)"/>
    </g>

    <!-- rolled-over flanks: top surface narrows toward the middle -->
    <path d="
      M 68 48
      C 116 48, 154 54, 200 54
      C 246 54, 284 48, 332 48
      C 302 56, 254 72, 200 72
      C 146 72, 98 56, 68 48
      Z" fill="url(#flankTop)" opacity="0.85"/>
    <path d="
      M 68 212
      C 116 212, 154 206, 200 206
      C 246 206, 284 212, 332 212
      C 302 204, 254 190, 200 190
      C 146 190, 98 204, 68 212
      Z" fill="url(#flankBottom)" opacity="0.8"/>

    <!-- specular crest where the ridges roll over the flank edges -->
    <path d="M 82 56 C 116 61, 152 75, 200 75 C 248 75, 284 61, 318 56"
          fill="none" stroke="#22272c" stroke-width="3" stroke-opacity="0.3"
          stroke-linecap="round" filter="url(#soft3)"/>
    <path d="M 78 51 C 112 56, 150 70, 200 70 C 250 70, 288 56, 322 51"
          fill="none" stroke="#ffffff" stroke-width="2.4" stroke-opacity="0.9"
          stroke-linecap="round" filter="url(#soft1)"/>
    <path d="M 84 208 C 118 204, 154 192, 200 192 C 246 192, 282 204, 316 208"
          fill="none" stroke="#ffffff" stroke-width="1.8" stroke-opacity="0.5"
          stroke-linecap="round" filter="url(#soft1)"/>

    <!-- end-cap highlights -->
    <rect x="24"  y="40" width="112" height="180" fill="url(#endGlowL)"/>
    <rect x="264" y="40" width="112" height="180" fill="url(#endGlowR)"/>

    <!-- rounded shoulders falling away at the far ends -->
    <rect x="24"  y="40" width="44" height="180" fill="url(#endFallL)"/>
    <rect x="332" y="40" width="44" height="180" fill="url(#endFallR)"/>

    <!-- vertical environment streaks reflected in the polished end caps -->
    <rect x="52"  y="40" width="9" height="180" fill="#3f454b" opacity="0.16" filter="url(#soft3)"/>
    <rect x="74"  y="40" width="5" height="180" fill="#ffffff" opacity="0.35" filter="url(#soft1)"/>
    <rect x="338" y="40" width="9" height="180" fill="#3f454b" opacity="0.14" filter="url(#soft3)"/>
    <rect x="322" y="40" width="5" height="180" fill="#ffffff" opacity="0.3" filter="url(#soft1)"/>

    <!-- brushed metal micro-texture across the whole cap -->
    <use href="#capOutline" fill="#ffffff" filter="url(#brushed)" opacity="0.14"/>

    <!-- diagonal studio sheen over everything -->
    <use href="#capOutline" fill="url(#sheen)"/>

    <!-- center indicator slot -->
    <rect x="193" y="40" width="14" height="180" fill="url(#slot)"/>
    <rect x="188" y="40" width="4"  height="180" fill="#ffffff" opacity="0.9"/>
    <rect x="208" y="40" width="4"  height="180" fill="#eef1f3" opacity="0.8"/>

    <!-- ambient occlusion hugging the inside of the rim -->
    <use href="#capOutline" fill="none" stroke="#1c2126" stroke-width="5"
         stroke-opacity="0.18" filter="url(#soft1)"/>
    <!-- bevel: bright inner rim -->
    <use href="#capOutline" fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="2.5"
         transform="translate(200 130) scale(0.988) translate(-200 -130)"/>
  </g>

  <!-- outer rim -->
  <use href="#capOutline" fill="none" stroke="#3c4248" stroke-width="1.6"/>
</svg>
